name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload DMG
    runs-on: macos-15
    env:
      BUILD_ARCH: arm64
      SKIP_SIGN: "1"
      SKIP_NOTARIZE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          uname -m

      - name: Install DMG tooling
        run: |
          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi

      - name: Build DMG
        run: ./scripts/build-dmg.sh "$VERSION"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" .build/CodeIsland.dmg --clobber
