name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g. 1.0.25). Creates a GitHub Release and builds DMG.
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload DMG
    runs-on: macos-15
    env:
      BUILD_ARCH: arm64
      SKIP_SIGN: "1"
      SKIP_NOTARIZE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "VERSION=$INPUT_VERSION" >> "$GITHUB_ENV"
          else
            VERSION="${REF_NAME#v}"
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          uname -m

      - name: Install DMG tooling
        run: |
          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi

      - name: Build DMG
        run: ./scripts/build-dmg.sh "$VERSION"

      - name: Create GitHub Release and upload DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading DMG"
            gh release upload "$TAG" .build/CodeIsland.dmg --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "v${VERSION}" \
              --notes "" \
              .build/CodeIsland.dmg
          fi
