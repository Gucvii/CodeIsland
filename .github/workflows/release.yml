name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build universal binary and app bundle
        run: ./build.sh
        env:
          SIGN_ID: "-"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: .build/release/CodeIsland.dmg
          generate_release_notes: true

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download DMG from release
        run: |
          curl -L \
            "https://github.com/Gucvii/CodeIsland/releases/download/v${VERSION}/CodeIsland.dmg" \
            -o CodeIsland.dmg

      - name: Compute SHA256
        run: echo "SHA256=$(sha256sum CodeIsland.dmg | awk '{print $1}')" >> $GITHUB_ENV

      - name: Clone homebrew-tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/Gucvii/homebrew-tap.git" homebrew-tap

      - name: Update Cask formula
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/codeisland.rb <<'CASK_EOF'
          cask "codeisland" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/Gucvii/CodeIsland/releases/download/v#{version}/CodeIsland.dmg"
            name "CodeIsland"
            desc "Menu bar companion for Claude Code, Codex, Gemini CLI and more"
            homepage "https://github.com/Gucvii/CodeIsland"

            app "CodeIsland.app"

            zap trash: [
              "~/.codeisland",
            ]
          end
          CASK_EOF
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" homebrew-tap/Casks/codeisland.rb
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/" homebrew-tap/Casks/codeisland.rb
          sed -i 's/^          //' homebrew-tap/Casks/codeisland.rb

      - name: Commit and push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/codeisland.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update codeisland to ${VERSION}"
            git push
          fi
